<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Inquiry - Neta Nexus</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0A0908;
            color: #FDFCF8;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #141311;
            border: 1px solid #262420;
            border-radius: 16px;
            overflow: hidden;
        }
        .header {
            background-color: #141311;
            padding: 32px;
            text-align: center;
            border-bottom: 1px solid #262420;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: #D4AF37;
            letter-spacing: -0.02em;
        }
        .content {
            padding: 32px;
        }
        .content h2 {
            font-size: 18px;
            margin-top: 0;
            color: #FDFCF8;
            border-bottom: 1px solid #262420;
            padding-bottom: 12px;
        }
        .field-group {
            margin-bottom: 20px;
        }
        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #A8A39D;
            margin-bottom: 4px;
        }
        .value {
            font-size: 16px;
            color: #FDFCF8;
            line-height: 1.5;
        }
        .message-box {
            background-color: #0A0908;
            border: 1px solid #262420;
            padding: 16px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .footer {
            padding: 24px;
            background-color: #0A0908;
            text-align: center;
            font-size: 12px;
            color: #A8A39D;
            border-top: 1px solid #262420;
        }
        .accent-bar {
            height: 4px;
            background: linear-gradient(90deg, #00594C, #D4AF37);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="accent-bar"></div>
        <div class="header">
            <h1>NETA NEXUS</h1>
            <p style="margin: 8px 0 0; font-size: 14px; color: #A8A39D;">New Inquiry Received</p>
        </div>
        <div class="content">
            <h2>Submission Details</h2>
            
            <div class="field-group">
                <div class="label">Name</div>
                <div class="value">{{firstName}} {{lastName}}</div>
            </div>
            
            <div class="field-group">
                <div class="label">Email Address</div>
                <div class="value">{{email}}</div>
            </div>
            
            <div class="field-group">
                <div class="label">Phone / WhatsApp</div>
                <div class="value">{{phone}}</div>
            </div>
            
            <div class="field-group">
                <div class="label">Service of Interest</div>
                <div class="value">{{service}}</div>
            </div>
            
            <div class="field-group">
                <div class="label">Message</div>
                <div class="message-box">
                    <div class="value">{{message}}</div>
                </div>
            </div>
        </div>
        <div class="footer">
            &copy; 2024 Neta Nexus. All rights reserved.<br>
            Sent from Neta Nexus Website Contact Form
        </div>
    </div>
</body>
</html>
